<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — RebornArtistry</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"></head>
<body>

<div class="auth-bg-img" style="background-image:url('images/art12.jpg');"></div>
<div class="auth-bg-ov"></div>

<div class="auth-page">
  <div class="auth-card">
    <!-- Brand logo → home -->
    <div style="text-align:center;margin-bottom:1.8rem;">
      <a href="index.html" style="display:inline-block;text-decoration:none;">
        <img src="images/reborn-logo.png" alt="RebornArtistry" style="height:60px;width:auto;object-fit:contain;display:block;margin:0 auto .6rem;">
      </a>
      <p style="color:var(--text3);margin:0;">Join our collector community</p>
    </div>

    <!-- SSO Buttons -->
    <button class="sso-btn">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign up with Google
    </button>
    <button class="sso-btn">
      <i class="bi bi-facebook" style="color:#1877F2;font-size:18px;"></i>
      Sign up with Facebook
    </button>
    <button class="sso-btn">
      <svg width="18" height="18" fill="var(--text)" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      Sign up with Apple
    </button>

    <div class="auth-divider"><span>or create with email</span></div>

    <!-- Form -->
    <div class="row g-2">
      <div class="col-6">
        <label class="flabel">First Name</label>
        <input type="text" class="finput" placeholder="First name">
      </div>
      <div class="col-6">
        <label class="flabel">Last Name</label>
        <input type="text" class="finput" placeholder="Last name">
      </div>
    </div>

    <label class="flabel">Email Address</label>
    <input type="email" class="finput" placeholder="your@email.com">

    <label class="flabel">Password</label>
    <div class="feye-wrap" style="margin-bottom:.9rem;">
      <input type="password" class="finput" placeholder="Create a password (min 8 chars)">
      <button class="feye-btn" type="button"><i class="bi bi-eye"></i></button>
    </div>

    <label class="flabel">Confirm Password</label>
    <div class="feye-wrap" style="margin-bottom:.9rem;">
      <input type="password" class="finput" placeholder="Repeat your password">
      <button class="feye-btn" type="button"><i class="bi bi-eye"></i></button>
    </div>

    
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:1.2rem;font-size:14px!important;color:var(--text2);">
      <input type="checkbox" style="accent-color:var(--rose);flex-shrink:0;">
      <span style="">I agree to the <a href="#" style="color:var(--rose);">Terms of Service</a> and <a href="#" style="color:var(--rose);">Privacy Policy</a></span>
    </label>

    <button class="btn-rose" style="width:100%;justify-content:center;padding:.8rem;">Create Account →</button>

    <p style="text-align:center;color:var(--text3);margin-top:1.3rem;">Already have an account? <a href="login.html" style="color:var(--rose);font-weight:500;">Sign in</a></p>
    
  </div>
</div>

<script src="js/main.js"></script>
<script>document.addEventListener('DOMContentLoaded',()=>{initTheme();initDir();initEyes();});</script>
</body>
</html>
